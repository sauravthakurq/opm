name: Create Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build_and_release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a GitHub Release
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK (Arm64 GMS Debug for testing, or replace with Release)
        # We are using assembleArm64GmsDebug by default in case you do not have keystore secrets set up.
        # Once you add KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD to your repo secrets,
        # you can change this to `assembleArm64GmsRelease` or `assembleUniversalGmsRelease`.
        run: ./gradlew assembleArm64GmsDebug --no-daemon

      - name: Rename APK
        run: |
          # Find the generated APK and rename it to include the version tag
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} OPM-${{ github.ref_name }}.apk \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: OPM-${{ github.ref_name }}.apk
          generate_release_notes: true
          # The release title will automatically be the tag name (e.g. v1.0.0)
          # The release notes will be automatically generated from the commits and PRs since the last tag.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
