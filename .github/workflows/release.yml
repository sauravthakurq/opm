name: Create Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build_and_release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a GitHub Release
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up Signing Keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/keystore/release.keystore

      - name: Build APK (Release)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleArm64GmsRelease --no-daemon

      - name: Rename APK
        run: |
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} OPM-${{ github.ref_name }}.apk \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OPM-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
