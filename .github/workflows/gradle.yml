- name: Generate release keystore
  run: |
    keytool -genkeypair -v \
      -keystore app/release.keystore \
      -storepass "${{ secrets.STORE_PASSWORD }}" \
      -alias "${{ secrets.KEY_ALIAS }}" \
      -keypass "${{ secrets.KEY_PASSWORD }}" \
      -keyalg RSA \
      -keysize 2048 \
      -validity 10000 \
      -dname "CN=Echo Music,O=Echo,C=US" \
      -noprompt